[pytest]
testpaths = tests
pythonpath = src
# `-m "not live"` is what actually excludes the service-dependent tests; a
# command-line -m overrides it (run them with: pytest -m live).
addopts = -q --strict-markers -m "not live"
markers =
    live: needs the shared services (agent_server/ingestion/embeddings); excluded by default
